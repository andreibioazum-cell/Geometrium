name: Build Geometrium

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      with:
        packages: |
          platform-tools
          build-tools;34.0.0
          platforms;android-34
          ndk;27.3.13750724
        cmdline-tools-version: 11.0
    
    - name: Setup environment
      run: |
        echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/27.3.13750724" >> $GITHUB_ENV
        echo "ANDROID_SDK_ROOT=$ANDROID_HOME" >> $GITHUB_ENV
        echo "PATH=$ANDROID_HOME/build-tools/34.0.0:$PATH" >> $GITHUB_ENV
        echo "PATH=$ANDROID_HOME/platform-tools:$PATH" >> $GITHUB_ENV
    
    - name: Create jni folder and Android.mk
      run: |
        mkdir -p jni
        
        cat > jni/Android.mk << 'EOF'
        LOCAL_PATH := $(call my-dir)
        
        include $(CLEAR_VARS)
        LOCAL_MODULE := main
        LOCAL_SRC_FILES := ../main.c
        LOCAL_C_INCLUDES := $(LOCAL_PATH)/..
        LOCAL_LDLIBS := -llog -landroid -lEGL -lGLESv2
        LOCAL_STATIC_LIBRARIES := android_native_app_glue
        LOCAL_CFLAGS := -Wall -O2
        include $(BUILD_SHARED_LIBRARY)
        
        $(call import-module,android/native_app_glue)
        EOF
        
        cat > jni/Application.mk << 'EOF'
        APP_ABI := arm64-v8a armeabi-v7a x86 x86_64
        APP_PLATFORM := android-21
        APP_STL := c++_static
        APP_OPTIM := release
        APP_CFLAGS := -Wall -O2
        EOF
    
    - name: Build with ndk-build
      run: |
        $ANDROID_NDK_HOME/ndk-build -j$(nproc)
        echo "Build completed, checking libs folder..."
        ls -la libs/
        find . -name "*.so" -o -name "*.apk"
    
    - name: Create APK
      run: |
        mkdir -p apk/lib/arm64-v8a apk/lib/armeabi-v7a apk/lib/x86 apk/lib/x86_64
        
        # Copy all built libraries
        cp -r libs/* apk/ 2>/dev/null || true
        
        # Copy AndroidManifest
        cp AndroidManifest.xml apk/
        
        # Create APK
        aapt package -f -M apk/AndroidManifest.xml \
            -I $ANDROID_HOME/platforms/android-34/android.jar \
            -F Geometrium-unsigned.apk apk/
        
        # Align
        zipalign -f -p 4 Geometrium-unsigned.apk Geometrium-aligned.apk
        
        # Create debug keystore if not exists
        if [ ! -f debug.keystore ]; then
            keytool -genkey -v -keystore debug.keystore \
                -alias androiddebugkey -storepass android -keypass android \
                -keyalg RSA -keysize 2048 -validity 10000 \
                -dname "CN=Android Debug, O=Android, C=US"
        fi
        
        # Sign
        apksigner sign --ks debug.keystore \
            --ks-pass pass:android --key-pass pass:android \
            --ks-key-alias androiddebugkey Geometrium-aligned.apk
        
        mv Geometrium-aligned.apk Geometrium.apk
        
        echo "APK created successfully!"
        ls -la *.apk
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Geometrium-APK
        path: Geometrium.apk
    
    - name: Upload all builds
      uses: actions/upload-artifact@v4
      with:
        name: Geometrium-All-Files
        path: |
          libs/
          Geometrium.apk
