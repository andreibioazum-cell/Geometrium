name: Build Geometrium

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: android-actions/setup-android@v3
    - name: Install Android SDK packages
      run: |
        yes | sdkmanager --licenses
        sdkmanager --install "platforms;android-34" "build-tools;34.0.0" "platform-tools"
    - uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c
    - name: Get STB
      run: wget -O stb_image.h https://raw.githubusercontent.com/nothings/stb/master/stb_image.h
    - name: Build
      run: |
        set -euo pipefail
        NDK_ROOT="${ANDROID_NDK_ROOT:-${ANDROID_NDK_HOME:-}}"
        if [ -z "$NDK_ROOT" ]; then
          echo "ANDROID_NDK_ROOT/ANDROID_NDK_HOME is not set" >&2
          exit 1
        fi
        TOOLCHAIN="$NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin"
        GLUE="$NDK_ROOT/sources/android/native_app_glue"
        if [ ! -d "$GLUE" ]; then
          echo "Native app glue directory not found: $GLUE" >&2
          exit 1
        fi
        FLAGS="-O2 -s -fPIC -shared -I. -I$GLUE -landroid -llog -lGLESv2 -lEGL -lm"
        "$TOOLCHAIN/aarch64-linux-android21-clang" main.c "$GLUE/android_native_app_glue.c" -o libmain_64.so $FLAGS
        "$TOOLCHAIN/armv7a-linux-androideabi21-clang" main.c "$GLUE/android_native_app_glue.c" -o libmain_32.so $FLAGS
    - name: Package
      run: |
        set -euo pipefail
        SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
        if [ -z "$SDK_ROOT" ]; then
          echo "ANDROID_SDK_ROOT/ANDROID_HOME is not set" >&2
          exit 1
        fi
        mkdir -p staging/lib/arm64-v8a staging/lib/armeabi-v7a staging/assets
        cp libmain_64.so staging/lib/arm64-v8a/libmain.so
        cp libmain_32.so staging/lib/armeabi-v7a/libmain.so
        cp *.png staging/assets/ 2>/dev/null || true
        BT="$SDK_ROOT/build-tools/34.0.0"
        if [ ! -d "$BT" ]; then
          echo "Build tools directory not found: $BT" >&2
          exit 1
        fi
        AAPT_BIN="$BT/aapt2"
        if [ ! -x "$AAPT_BIN" ]; then
          AAPT_BIN="$BT/aapt"
        fi
        if [ ! -x "$AAPT_BIN" ]; then
          echo "Neither aapt2 nor aapt was found in $BT" >&2
          exit 1
        fi
        "$AAPT_BIN" package -f -M AndroidManifest.xml -I "$SDK_ROOT/platforms/android-34/android.jar" -F unsigned.apk staging/
        "$BT/zipalign" -v 4 unsigned.apk aligned.apk
        keytool -genkey -v -keystore d.keystore -storepass android -alias a -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=D"
        "$BT/apksigner" sign --ks d.keystore --ks-pass pass:android --out Geometrium.apk aligned.apk
    - uses: actions/upload-artifact@v4
      with:
        name: Geometrium
        path: Geometrium.apk
