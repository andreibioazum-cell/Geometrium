name: Build Geometrium

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Android NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r26d
    
    - name: Build
      run: |
        mkdir -p jni
        cat > jni/Android.mk << 'EOF'
        LOCAL_PATH := $(call my-dir)
        include $(CLEAR_VARS)
        LOCAL_MODULE := main
        LOCAL_SRC_FILES := ../main.c
        LOCAL_C_INCLUDES := $(LOCAL_PATH)/..
        LOCAL_LDLIBS := -llog -landroid -lEGL -lGLESv2
        LOCAL_STATIC_LIBRARIES := android_native_app_glue
        include $(BUILD_SHARED_LIBRARY)
        $(call import-module,android/native_app_glue)
        EOF
        
        cat > jni/Application.mk << 'EOF'
        APP_ABI := arm64-v8a
        APP_PLATFORM := android-21
        APP_OPTIM := release
        EOF
        
        export ANDROID_NDK_HOME=$ANDROID_NDK_ROOT
        $ANDROID_NDK_ROOT/ndk-build -j$(nproc)
    
    - name: Package APK
      run: |
        mkdir -p apk/lib/arm64-v8a
        cp libs/arm64-v8a/libmain.so apk/lib/arm64-v8a/
        cp AndroidManifest.xml apk/
        
        # Устанавливаем aapt
        sudo apt-get update
        sudo apt-get install -y aapt
        
        # Создаём APK
        aapt package -f -M apk/AndroidManifest.xml -F Geometrium.apk apk/
    
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Geometrium-APK
        path: Geometrium.apk
