name: Build Geometrium
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup NDK
      uses: nttld/setup-ndk@v1
      with:
        ndk-version: r25c

    - name: Get STB
      run: wget -O stb_image.h https://raw.githubusercontent.com/nothings/stb/master/stb_image.h

    - name: Build Libraries
      run: |
        TOOLCHAIN=$ANDROID_NDK_ROOT/toolchains/llvm/prebuilt/linux-x86_64/bin
        # Build arm64 (v8a)
        $TOOLCHAIN/aarch64-linux-android21-clang -shared -fPIC main.c \
          $ANDROID_NDK_ROOT/sources/android/native_app_glue/android_native_app_glue.c \
          -o libmain_64.so -I. -I$ANDROID_NDK_ROOT/sources/android/native_app_glue -landroid -llog -lGLESv2 -lEGL -lm
        # Build armv7 (32-bit)
        $TOOLCHAIN/armv7a-linux-androideabi21-clang -shared -fPIC main.c \
          $ANDROID_NDK_ROOT/sources/android/native_app_glue/android_native_app_glue.c \
          -o libmain_32.so -I. -I$ANDROID_NDK_ROOT/sources/android/native_app_glue -landroid -llog -lGLESv2 -lEGL -lm

    - name: Package and Align
      run: |
        mkdir -p staging/lib/arm64-v8a staging/lib/armeabi-v7a staging/assets
        cp libmain_64.so staging/lib/arm64-v8a/libmain.so
        cp libmain_32.so staging/lib/armeabi-v7a/libmain.so
        
        BUILD_TOOLS=$ANDROID_HOME/build-tools/34.0.0
        
        # 1. Создаем начальный пакет
        $BUILD_TOOLS/aapt package -f -M AndroidManifest.xml -I $ANDROID_HOME/platforms/android-34/android.jar -F unsigned.apk staging/
        
        # 2. ZIPALIGN (КРИТИЧЕСКИ ВАЖНО ДЛЯ ANDROID 14)
        $BUILD_TOOLS/zipalign -v 4 unsigned.apk aligned.apk

        # 3. Подпись
        keytool -genkey -v -keystore d.keystore -storepass android -alias a -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=D"
        $BUILD_TOOLS/apksigner sign --ks d.keystore --ks-pass pass:android --out Geometrium.apk aligned.apk

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: Geometrium-Final
        path: Geometrium.apk
